name: Deploy Spring Boot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/backend/business_system
            git pull origin main
            mvn clean package -DskipTests
            PID=$(pgrep -f "business_system-0.0.1-SNAPSHOT.jar")
            if [ -n "$PID" ]; then
              kill "$PID"
              sleep 5
            fi
            nohup java -jar target/business_system-0.0.1-SNAPSHOT.jar > app.log 2>&1 </dev/null &
            disown
