<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business System</title>


<style>

*{
    box-sizing:border-box;
}


body {

    margin:0;

    font-family:Arial,sans-serif;

    background:#0b0f1a;

    color:white;

    text-align:center;

}



/* TOP BAR */

.topbar {

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:15px 20px;

    background:#111827;

}



.menu {

    cursor:pointer;

    font-size:22px;

    padding:5px 12px;

    background:#1f2937;

    border-radius:6px;

}



/* DROPDOWN */

.dropdown {

    display:none;

    position:absolute;

    right:20px;

    top:65px;

    background:#1f2937;

    width:160px;

    border-radius:10px;

    padding:10px;

    text-align:left;

}



.dropdown a {

    display:block;

    color:white;

    padding:10px;

    text-decoration:none;

}



.dropdown a:hover {

    background:#374151;

}



/* CONTENT */

.content {

    margin-top:80px;

    padding:20px;

}



h1 {

    color:#22c55e;

    font-size:40px;

}



p {

    max-width:850px;

    margin:auto;

    line-height:1.7;

    color:#cbd5e1;

    font-size:20px;

}



.btn {

    display:inline-block;

    margin-top:30px;

    padding:14px 35px;

    background:#22c55e;

    color:white;

    text-decoration:none;

    border-radius:10px;

    font-weight:bold;

}



.btn:hover{

    background:#16a34a;

}



/* MOBILE */

@media(max-width:600px){


h1{

    font-size:28px;

}


p{

    font-size:16px;

}


.content{

    margin-top:50px;

}


.btn{

    width:90%;

}



}



</style>



<script>

function toggleMenu(){

var menu=document.getElementById("menu");


if(menu.style.display==="block"){

menu.style.display="none";

}

else{

menu.style.display="block";

}


}

</script>


</head>


<body>



<div class="topbar">


<div>

<b>🚀 Business System</b>

</div>


<div class="menu" onclick="toggleMenu()">

☰

</div>


</div>



<div id="menu" class="dropdown">


<a href="/">Home</a>

<a href="/about">About</a>

<a href="/login">Login</a>

<a href="/contact">Contact</a>


</div>



<div class="content">


<h1>
WELCOME TO BUSINESS SYSTEM
</h1>


<p>

Manage Your Team, Affiliate Subscription Earnings, Hybrid Matrix Binary Income Growth Network System,
Mega Rank Rewards, Wallet Management, And Advanced Business Analytics From One Powerful Dashboard.

</p>



<a class="btn" href="/login">

LOGIN NOW

</a>



</div>



</body>

</html>
